name: Uptime Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read
  issues: write

jobs:
  healthz-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Uptime Monitor
        id: uptime
        run: node services/control-api/scripts/uptime-monitor.js
        env:
          UPTIME_URLS: ${{ vars.UPTIME_URLS }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          ALERT_WEBHOOK_BEARER_TOKEN: ${{ secrets.ALERT_WEBHOOK_BEARER_TOKEN }}

      - name: Create Or Update Uptime Incident Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Uptime Monitor Incident';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              'Automatic alert from uptime monitor workflow.',
              '',
              `- Workflow run: ${runUrl}`,
              `- Trigger: ${context.eventName}`,
              `- Timestamp (UTC): ${new Date().toISOString()}`,
              '',
              'Please investigate `healthz` failures for staging/production.'
            ].join('\n');

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['incident', 'uptime']
              });
            }
