name: Extension Hardening

on:
  workflow_dispatch:
    inputs:
      run_maps:
        description: "Run Google Maps e2e hardening variant"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - "packages/core/**"
      - "packages/extension/**"
      - "scripts/**"
      - "docs/**"
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "packages/core/**"
      - "packages/extension/**"
      - "scripts/**"
      - "docs/**"

permissions:
  contents: read

jobs:
  local-hardening-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Local Hardening (E2E simple)
        run: npm run test:local:hardening:e2e

      - name: Run Local Hardening (E2E maps)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_maps == true }}
        run: npm run test:local:hardening:e2e:maps

      - name: Upload E2E Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extension-e2e-artifacts
          path: dist/e2e
          if-no-files-found: ignore
